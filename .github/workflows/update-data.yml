name: Update economic data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from World Bank API
        run: node scripts/fetch-data.js

      - name: Check if data changed
        id: diff
        run: |
          git diff --quiet data/stats.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          git commit -m "chore: update economic data $(date +%Y-%m-%d)"
          git push --force

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "Data unchanged, nothing to commit."
